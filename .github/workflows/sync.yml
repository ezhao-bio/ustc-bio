name: Sync from USTC LaTeX

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Pull from USTC and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote add ustc https://latex.ustc.edu.cn/git/6979344991148512e332453f.git || true
          git fetch ustc
          USTC_BRANCH=$(git remote show ustc | grep 'HEAD branch' | awk '{print $NF}')
          git merge ustc/$USTC_BRANCH --allow-unrelated-histories -m "Sync from USTC LaTeX" || true
          git push origin main
