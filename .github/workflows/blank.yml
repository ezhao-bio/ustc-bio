name: Sync from USTC LaTeX

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull from USTC and push
        run: |
          git remote add ustc https://latex.ustc.edu.cn/git/6979344991148512e332453f || true
          git fetch ustc
          git merge ustc/main --allow-unrelated-histories -m "Sync from USTC LaTeX"
          git push origin main
